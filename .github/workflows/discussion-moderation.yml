name: Discussion Moderation Agent

on:
  discussion:
    types: [created, edited]
  discussion_comment:
    types: [created, edited]
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  moderate:
    name: Moderate Discussions Against Repo Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Moderate discussion content
        env:
          DISCUSSION_MODERATION_ADMIN_TOKEN: ${{ secrets.DISCUSSION_MODERATION_ADMIN_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 Scripts/github/discussion_moderation_agent.py --root .
